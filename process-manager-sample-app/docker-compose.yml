services:
  app:
    build:
      context: ..
      dockerfile: process-manager-sample-app/Dockerfile
    image: process-manager-sample-app:local
    container_name: process-manager-sample-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SAMPLE_DB_URL: jdbc:postgresql://postgres:5432/process_manager_sample
      SAMPLE_DB_USERNAME: process_manager
      SAMPLE_DB_PASSWORD: process_manager
      SAMPLE_SERVER_PORT: 8080
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17
    container_name: process-manager-sample-postgres
    environment:
      POSTGRES_DB: process_manager_sample
      POSTGRES_USER: process_manager
      POSTGRES_PASSWORD: process_manager
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U process_manager -d process_manager_sample"]
      interval: 5s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v3.11.1
    container_name: process-manager-sample-prometheus
    depends_on:
      - app
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro

  grafana:
    image: grafana/grafana:13.0
    container_name: process-manager-sample-grafana
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
