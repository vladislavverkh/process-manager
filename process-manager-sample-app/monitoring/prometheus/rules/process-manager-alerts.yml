groups:
  - name: process-manager-runtime
    labels:
      service: process-manager
    rules:
      - alert: ProcessManagerOverdueDeadlines
        expr: sum(process_manager_deadline_overdue) > 0
        for: 2m
        keep_firing_for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Process-manager has overdue deadlines"
          description: "{{ $value }} process deadlines are overdue. Check deadline watchdog, command scheduler and PostgreSQL latency."
          dashboard_url: "http://localhost:3000/d/process-manager-runtime/process-manager-runtime"

      - alert: ProcessManagerOptimisticLockConflictsGrowing
        expr: sum by (process_type, state) (increase(process_manager_optimistic_lock_conflicts_total[5m])) > 5
        for: 5m
        keep_firing_for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Optimistic lock conflicts are growing in {{ $labels.process_type }}/{{ $labels.state }}"
          description: "{{ $value }} optimistic lock conflicts were recorded in the last 5 minutes. Check duplicated commands, concurrent resume paths or hot partitions."
          dashboard_url: "http://localhost:3000/d/process-manager-runtime/process-manager-runtime"

      - alert: ProcessManagerRetrySpike
        expr: sum by (process_type, state, result_code) (increase(process_manager_retries_scheduled_total[10m])) > 20
        for: 2m
        keep_firing_for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Retry spike in {{ $labels.process_type }}/{{ $labels.state }}"
          description: "{{ $value }} retries were scheduled in the last 10 minutes for result_code={{ $labels.result_code }}. Check external dependency health and retry policy."
          dashboard_url: "http://localhost:3000/d/process-manager-runtime/process-manager-runtime"

      - alert: ProcessManagerMissingCommands
        expr: sum by (process_type, reason) (increase(process_manager_commands_resumed_total{outcome="missing"}[10m])) > 0
        for: 2m
        keep_firing_for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Process command references a missing instance"
          description: "{{ $value }} missing process commands were resumed in the last 10 minutes for reason={{ $labels.reason }}. Check command retention, manual replays and instance cleanup timing."
          dashboard_url: "http://localhost:3000/d/process-manager-runtime/process-manager-runtime"

      - alert: ProcessManagerStaleCommandsSpike
        expr: sum by (process_type, reason) (increase(process_manager_commands_resumed_total{outcome="stale_version"}[10m])) > 10
        for: 5m
        keep_firing_for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Stale process commands spike for {{ $labels.process_type }}"
          description: "{{ $value }} stale process commands were skipped in the last 10 minutes for reason={{ $labels.reason }}. Check duplicated delayed commands and scheduler retries."
          dashboard_url: "http://localhost:3000/d/process-manager-runtime/process-manager-runtime"
