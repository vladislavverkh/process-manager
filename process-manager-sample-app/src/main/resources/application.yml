spring:
  application:
    name: process-manager-sample-app
  datasource:
    url: ${SAMPLE_DB_URL:jdbc:postgresql://localhost:54320/process_manager_sample}
    username: ${SAMPLE_DB_USERNAME:process_manager}
    password: ${SAMPLE_DB_PASSWORD:process_manager}

server:
  port: ${SAMPLE_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

process:
  manager:
    deadline-batch-size: 50
